<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#e2e3e5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Trọ Mười">
    <link rel="apple-touch-icon" href="/assets/icons/motel_192.png">

    <title>Trọ Mười</title>

    <link rel="stylesheet" href="./assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <style>
        @media (hover: none) {
            .btn-outline-dark:hover:not(.active) {
                color: #212529 !important;
                background-color: transparent !important;
                border-color: #212529 !important;
            }
        }
    </style>
</head>

<body>
    <div class="container-fluid fs-4 bg-secondary-subtle p-0">
        <!-- ĐIỆN -->
        <div class="row align-items-center m-0" style="height: 100vh;" id="modal-dien">
            <div class="col p-0">
                <div class="card text-center">
                    <div class="card-header">
                        <span class="badge text-bg-warning fs-2 mb-1 mt-1">ĐIỆN</span><br>
                        <span class="fw-bold fs-3">3.500</span><br>
                        <span class="text-secondary">VND / Số</span>
                    </div>
                    <div class="card-body">
                        <div class="input-group mb-3" style="height: 65px;">
                            <span class="input-group-text" style="width: 55px;">Cũ</span>
                            <input class="form-control" type="number" placeholder="Số điện cũ" id="so-dien-cu"
                                aria-label="Số điện cũ" min="0" step="1" pattern="\d*" autocomplete="off"
                                autocapitalize="off" autocorrect="off">
                            <span class="input-group-text">Số</span>
                        </div>
                        <div class="input-group" style="height: 65px;">
                            <span class="input-group-text" style="width: 55px;">Mới</span>
                            <input class="form-control" type="number" placeholder="Số điện mới" id="so-dien-moi"
                                aria-label="Số điện mới" min="0" step="1" pattern="\d*" autocomplete="off"
                                autocapitalize="off" autocorrect="off">
                            <span class="input-group-text">Số</span>
                        </div>
                    </div>
                    <div class="card-footer">
                        <div class="container">
                            <div class="row">
                                <div class="col">
                                    <button type="button" class="btn btn-outline-primary" style="width: 40%;"
                                        onclick="processDien()">
                                        <i class="bi bi-arrow-right-circle fs-2"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col dien notification"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- NƯỚC -->
        <div class="row align-items-center m-0" style="height: 100vh;" id="modal-nuoc" hidden>
            <div class="col p-0">
                <div class="card text-center">
                    <div class="card-header">
                        <span class="badge text-bg-primary fs-2 mb-1 mt-1">NƯỚC</span><br>
                        <span class="fw-bold fs-3">3.000</span><br>
                        <span class="text-secondary">VND / Số</span>
                    </div>
                    <div class="card-body">
                        <div class="input-group mb-3" style="height: 65px;">
                            <span class="input-group-text" style="width: 55px;">Cũ</span>
                            <input class="form-control" type="number" placeholder="Số nước cũ" id="so-nuoc-cu"
                                aria-label="Số nước cũ" min="0" step="1" pattern="\d*" autocomplete="off"
                                autocapitalize="off" autocorrect="off">
                            <span class="input-group-text">Số</span>
                        </div>
                        <div class="input-group" style="height: 65px;">
                            <span class="input-group-text" style="width: 55px;">Mới</span>
                            <input class="form-control" type="number" placeholder="Số nước mới" id="so-nuoc-moi"
                                aria-label="Số nước mới" min="0" step="1" pattern="\d*" autocomplete="off"
                                autocapitalize="off" autocorrect="off">
                            <span class="input-group-text">Số</span>
                        </div>
                    </div>
                    <div class="card-footer">
                        <div class="container">
                            <div class="row">
                                <div class="col-6">
                                    <button type="button" class="btn btn-outline-secondary w-100"
                                        onclick="prevModal('modal-dien', 'modal-nuoc')">
                                        <i class="bi bi-arrow-left-circle fs-2"></i>
                                    </button>
                                </div>

                                <div class="col-6">
                                    <button type="button" class="btn btn-outline-primary w-100" onclick="processNuoc()">
                                        <i class="bi bi-arrow-right-circle fs-2"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col nuoc notification"></div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>

        <!-- RÁC -->
        <div class="row align-items-center m-0" style="height: 100vh;" id="modal-rac" hidden>
            <div class="col p-0">
                <div class="card text-center">
                    <div class="card-header">
                        <span class="badge text-bg-secondary fs-2 mb-1 mt-1">RÁC</span><br>
                        <span class="text-secondary">VND / Căn</span>
                    </div>
                    <div class="card-body">
                        <div class="container">
                            <div class="row">
                                <div class="col">
                                    <button type="button" class="btn btn-outline-dark w-100 fs-3 tien-rac"
                                        onclick="processTienRac(this)">
                                        25.000
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer">
                        <div class="container">
                            <div class="row">
                                <div class="col-6">
                                    <button type="button" class="btn btn-outline-secondary w-100"
                                        onclick="prevModal('modal-nuoc', 'modal-rac')">
                                        <i class="bi bi-arrow-left-circle fs-2"></i>
                                    </button>
                                </div>

                                <div class="col-6">
                                    <button type="button" class="btn btn-outline-primary w-100"
                                        onclick="nextModal('modal-rac', 'modal-thue')">
                                        <i class="bi bi-arrow-right-circle fs-2"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Thuê -->
        <div class="row align-items-center m-0" style="height: 100vh;" id="modal-thue" hidden>
            <div class="col p-0">
                <div class="card text-center">
                    <div class="card-header">
                        <span class="badge text-bg-secondary fs-2 mb-1 mt-1">THUÊ</span><br>
                        <span class="text-secondary">VND / Căn</span>
                    </div>

                    <div class="card-body">
                        <div class="container">
                            <div class="row">
                                <div class="col">
                                    <button class="btn btn-outline-dark w-100 fs-3 gia-thue-choice" type="button"
                                        style="height: 65px; width: 80%;" onclick="processGiaThueChoice(this)">
                                        1.400.000
                                    </button>
                                </div>
                            </div>

                            <div class="row mt-3">
                                <div class="col">
                                    <button class="btn btn-outline-dark w-100 fs-3 gia-thue-choice" type="button"
                                        style="height: 65px; width: 80%;" onclick="processGiaThueChoice(this)">
                                        2.300.000
                                    </button>
                                </div>
                            </div>

                            <div class="row mt-3">
                                <div class="col">
                                    <button class="btn btn-outline-dark w-100 fs-3 gia-thue-choice" type="button"
                                        style="height: 65px; width: 80%;" onclick="processGiaThueChoice(this)">
                                        2.500.000
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card-footer">
                        <div class="container">
                            <div class="row">
                                <div class="col-6">
                                    <button type="button" class="btn btn-outline-secondary w-100"
                                        onclick="prevModal('modal-rac', 'modal-thue')">
                                        <i class="bi bi-arrow-left-circle fs-2"></i>
                                    </button>
                                </div>

                                <div class="col-6">
                                    <button type="button" class="btn btn-success w-100 fs-2" onclick="processGiaThue()">
                                        Tính tiền
                                    </button>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col thue notification"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- BILL -->
        <div class="row align-items-center m-0" style="height: 100vh;" id="modal-bill" hidden>
            <div class="col p-0">
                <div class="card" id="card-bill">
                    <div class="card-header text-center">
                        <span class="badge text-bg-secondary fs-2 mb-1 mt-1">TIỀN TRỌ</span><br>
                        <span class="text-secondary fs-5" id="bill-date"></span>
                    </div>
                    <div class="card-body p-0">
                        <table class="table table-sm table-bordered fs-6 mb-0">
                            <thead class="table-dark">
                                <tr class="text-center">
                                    <th scope="col">Loại</th>
                                    <th scope="col">Cũ</th>
                                    <th scope="col">Mới</th>
                                    <th scope="col">Số</th>
                                    <th scope="col">Giá</th>
                                    <th scope="col">Tổng</th>
                                </tr>
                            </thead>
                            <tbody class="table-group-divider" id="bill-table">
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="card text-center mt-3">
                    <div class="card-body">
                        <div class="row">
                            <div class="col">
                                <button type="button" class="btn btn-outline-primary w-100 fs-4"
                                    onclick="captureAndShare()">
                                    Gửi bill
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card text-center mt-3">
                    <div class="card-body">
                        <div class="row">
                            <div class="col">
                                <button type="button" class="btn btn-outline-dark w-100 fs-4" onclick="reset()">
                                    Nhập mới
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="./assets/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/html2canvas.min.js.js"></script>
    <script src="./assets/js/index.js"></script>
    <script src="./assets/js/serviceWorker.js"></script>
</body>

</html>
