<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Trọ Mười</title>

    <link rel="stylesheet" href="./assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./assets/css/index.css">
</head>

<body>
    <div class="container">
        <!-- ĐIỆN -->
        <div class="row align-items-center" style="height: 100vh;" hidden>
            <div class="col">
                <div class="card text-center">
                    <div class="card-header">
                        <span class="badge text-bg-warning fs-2">ĐIỆN</span><br>
                        <span class="fw-bold fs-3">3,500</span><br>
                        <span class="text-secondary">VND / Số</span>
                    </div>
                    <div class="card-body">
                        <div class="input-group mb-3" style="height: 65px;">
                            <input class="form-control" type="number" name="" placeholder="Số điện cũ"
                                aria-describedby="so-dien-cu" aria-label="Số điện cũ" min="0" step="1">
                            <span class="input-group-text" id="so-dien-cu">Số</span>
                        </div>
                        <div class="input-group" style="height: 65px;">
                            <input class="form-control" type="number" name="" placeholder="Số điện mới"
                                aria-describedby="so-dien-moi" aria-label="Số điện mới" min="0" step="1">
                            <span class="input-group-text" id="so-dien-moi">Số</span>
                        </div>
                    </div>
                    <div class="card-footer">
                        <button type="button" class="btn btn-outline-primary" style="width: 40%;">
                            <i class="bi bi-arrow-right-circle fs-2"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- NƯỚC -->
        <div class="row align-items-center" style="height: 100vh;" hidden>
            <div class="col">
                <div class="card text-center">
                    <div class="card-header">
                        <span class="badge text-bg-primary fs-2">NƯỚC</span><br>
                        <span class="fw-bold fs-3">3,500</span><br>
                        <span class="text-secondary">VND / Số</span>
                    </div>
                    <div class="card-body">
                        <div class="input-group mb-3" style="height: 65px;">
                            <input class="form-control" type="number" name="" placeholder="Số nước cũ"
                                aria-describedby="so-dien-cu" aria-label="Số nước cũ" min="0" step="1">
                            <span class="input-group-text" id="so-dien-cu">Số</span>
                        </div>
                        <div class="input-group" style="height: 65px;">
                            <input class="form-control" type="number" name="" placeholder="Số nước mới"
                                aria-describedby="so-dien-moi" aria-label="Số nước mới" min="0" step="1">
                            <span class="input-group-text" id="so-dien-moi">Số</span>
                        </div>
                    </div>
                    <div class="card-footer">
                        <div class="container">
                            <div class="row">
                                <div class="col-6">
                                    <button type="button" class="btn btn-outline-secondary w-100">
                                        <i class="bi bi-arrow-left-circle fs-2"></i>
                                    </button>
                                </div>

                                <div class="col-6">
                                    <button type="button" class="btn btn-outline-primary w-100">
                                        <i class="bi bi-arrow-right-circle fs-2"></i>
                                    </button>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>

        <!-- RÁC -->
        <div class="row align-items-center" style="height: 100vh;" hidden>
            <div class="col">
                <div class="card text-center">
                    <div class="card-header">
                        <span class="badge text-bg-secondary fs-2">RÁC</span><br>
                        <span class="fw-bold fs-3">3,500</span><br>
                        <span class="text-secondary">VND / Căn</span>
                    </div>
                    <div class="card-footer">
                        <div class="container">
                            <div class="row">
                                <div class="col-6">
                                    <button type="button" class="btn btn-outline-secondary w-100">
                                        <i class="bi bi-arrow-left-circle fs-2"></i>
                                    </button>
                                </div>

                                <div class="col-6">
                                    <button type="button" class="btn btn-outline-primary w-100">
                                        <i class="bi bi-arrow-right-circle fs-2"></i>
                                    </button>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>

        <!-- Thuê -->
        <div class="row align-items-center" style="height: 100vh;" hidden>
            <div class="col">
                <div class="card text-center">
                    <div class="card-header">
                        <span class="badge text-bg-secondary fs-2">THUÊ</span><br>
                        <span class="text-secondary">VND / Căn</span>
                    </div>

                    <div class="card-body">
                        <div class="container">
                            <div class="row">
                                <div class="col">
                                    <button class="btn btn-outline-primary fs-3" data-bs-toggle="button" type="button"
                                        style="height: 65px; width: 80%;">
                                        1,500,000
                                    </button>
                                </div>

                                <div class="col">
                                    <button class="btn btn-outline-primary fs-3" data-bs-toggle="button" type="button"
                                        style="height: 65px; width: 80%;">
                                        2,000,000
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card-footer">
                        <div class="container">
                            <div class="row">
                                <div class="col-6">
                                    <button type="button" class="btn btn-outline-secondary w-100">
                                        <i class="bi bi-arrow-left-circle fs-2"></i>
                                    </button>
                                </div>

                                <div class="col-6">
                                    <button type="button" class="btn btn-success w-100 fs-2">
                                        Tính tiền
                                    </button>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>

        <!-- BILL -->
        <div class="row align-items-center" style="height: 100vh;">
            <div class="col">
                <div class="card text-center">
                    <div class="card-header">
                        <span class="badge text-bg-secondary fs-2">TIỀN TRỌ</span><br>
                        <span class="text-secondary fs-5">25/2/2026</span>
                    </div>

                    <div class="card-body">
                        <div class="row">
                            <div class="input-group mb-2">
                                <span class="input-group-text" style="width: 75px;">ĐIỆN</span>
                                <span class="input-group-text">0</span>
                                <input type="text" class="form-control text-end">
                                <span class="input-group-text">VND</span>
                            </div>

                            <div class="input-group mb-2">
                                <span class="input-group-text" style="width: 75px;">NƯỚC</span>
                                <span class="input-group-text">0</span>
                                <input type="text" class="form-control text-end">
                                <span class="input-group-text">VND</span>
                            </div>

                            <div class="input-group mb-2">
                                <span class="input-group-text" style="width: 75px;">RÁC</span>
                                <span class="input-group-text">1</span>
                                <input type="text" class="form-control text-end">
                                <span class="input-group-text">VND</span>
                            </div>


                            <div class="input-group">
                                <span class="input-group-text" style="width: 75px;">THUÊ</span>
                                <span class="input-group-text">1</span>
                                <input type="text" class="form-control text-end">
                                <span class="input-group-text">VND</span>
                            </div>
                        </div>
                    </div>

                    <div class="card-footer fs-5">
                        <div class="input-group">
                            <span class="input-group-text fw-bold" style="width: 75px;">TỔNG</span>
                            <input type="text" class="form-control text-end">
                            <span class="input-group-text">VND</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="./assets/js/bootstrap.bundle.min.js"></script>

    <script src="./index.js"></script>
</body>

</html>
