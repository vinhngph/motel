<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Trọ Mười</title>

    <link rel="stylesheet" href="./assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./assets/css/index.css">
</head>

<body>
    <div class="container fs-5 bg-secondary-subtle">
        <!-- ĐIỆN -->
        <div class="row align-items-center" style="height: 100vh;" id="modal-dien">
            <div class="col">
                <div class="card text-center">
                    <div class="card-header">
                        <span class="badge text-bg-warning fs-2">ĐIỆN</span><br>
                        <span class="fw-bold fs-3">3.500</span><br>
                        <span class="text-secondary">VND / Số</span>
                    </div>
                    <div class="card-body">
                        <div class="input-group mb-3" style="height: 65px;">
                            <input class="form-control" type="number" placeholder="Số điện cũ" id="so-dien-cu"
                                aria-label="Số điện cũ" min="0" step="1" pattern="\d*" autocomplete="off"
                                autocapitalize="off" autocorrect="off">
                            <span class="input-group-text">Số</span>
                        </div>
                        <div class="input-group" style="height: 65px;">
                            <input class="form-control" type="number" placeholder="Số điện mới" id="so-dien-moi"
                                aria-label="Số điện mới" min="0" step="1" pattern="\d*" autocomplete="off"
                                autocapitalize="off" autocorrect="off">
                            <span class="input-group-text">Số</span>
                        </div>
                    </div>
                    <div class="card-footer">
                        <div class="container">
                            <div class="row">
                                <div class="col">
                                    <button type="button" class="btn btn-outline-primary" style="width: 40%;"
                                        onclick="processDien()">
                                        <i class="bi bi-arrow-right-circle fs-2"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col dien notification"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- NƯỚC -->
        <div class="row align-items-center" style="height: 100vh;" id="modal-nuoc" hidden>
            <div class="col">
                <div class="card text-center">
                    <div class="card-header">
                        <span class="badge text-bg-primary fs-2">NƯỚC</span><br>
                        <span class="fw-bold fs-3">3.500</span><br>
                        <span class="text-secondary">VND / Số</span>
                    </div>
                    <div class="card-body">
                        <div class="input-group mb-3" style="height: 65px;">
                            <input class="form-control" type="number" placeholder="Số nước cũ" id="so-nuoc-cu"
                                aria-label="Số nước cũ" min="0" step="1" pattern="\d*" autocomplete="off"
                                autocapitalize="off" autocorrect="off">
                            <span class="input-group-text">Số</span>
                        </div>
                        <div class="input-group" style="height: 65px;">
                            <input class="form-control" type="number" placeholder="Số nước mới" id="so-nuoc-moi"
                                aria-label="Số nước mới" min="0" step="1" pattern="\d*" autocomplete="off"
                                autocapitalize="off" autocorrect="off">
                            <span class="input-group-text">Số</span>
                        </div>
                    </div>
                    <div class="card-footer">
                        <div class="container">
                            <div class="row">
                                <div class="col-6">
                                    <button type="button" class="btn btn-outline-secondary w-100"
                                        onclick="prevModal('modal-dien', 'modal-nuoc')">
                                        <i class="bi bi-arrow-left-circle fs-2"></i>
                                    </button>
                                </div>

                                <div class="col-6">
                                    <button type="button" class="btn btn-outline-primary w-100" onclick="processNuoc()">
                                        <i class="bi bi-arrow-right-circle fs-2"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col nuoc notification"></div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>

        <!-- RÁC -->
        <div class="row align-items-center" style="height: 100vh;" id="modal-rac" hidden>
            <div class="col">
                <div class="card text-center">
                    <div class="card-header">
                        <span class="badge text-bg-secondary fs-2">RÁC</span><br>
                        <span class="fw-bold fs-3">3.500</span><br>
                        <span class="text-secondary">VND / Căn</span>
                    </div>
                    <div class="card-footer">
                        <div class="container">
                            <div class="row">
                                <div class="col-6">
                                    <button type="button" class="btn btn-outline-secondary w-100"
                                        onclick="prevModal('modal-nuoc', 'modal-rac')">
                                        <i class="bi bi-arrow-left-circle fs-2"></i>
                                    </button>
                                </div>

                                <div class="col-6">
                                    <button type="button" class="btn btn-outline-primary w-100"
                                        onclick="nextModal('modal-rac', 'modal-thue')">
                                        <i class="bi bi-arrow-right-circle fs-2"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Thuê -->
        <div class="row align-items-center" style="height: 100vh;" id="modal-thue" hidden>
            <div class="col">
                <div class="card text-center">
                    <div class="card-header">
                        <span class="badge text-bg-secondary fs-2">THUÊ</span><br>
                        <span class="text-secondary">VND / Căn</span>
                    </div>

                    <div class="card-body">
                        <div class="container">
                            <div class="row align-items-center">
                                <div class="col">
                                    <button class="btn btn-outline-dark w-100 fs-3 gia-thue-choice" type="button"
                                        style="height: 65px; width: 80%;" onclick="processGiaThueChoice(this)">
                                        1.500.000
                                    </button>
                                </div>

                                <div class="col">
                                    <button class="btn btn-outline-dark w-100 fs-3 gia-thue-choice" type="button"
                                        style="height: 65px; width: 80%;" onclick="processGiaThueChoice(this)">
                                        2.000.000
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card-footer">
                        <div class="container">
                            <div class="row">
                                <div class="col-6">
                                    <button type="button" class="btn btn-outline-secondary w-100"
                                        onclick="prevModal('modal-rac', 'modal-thue')">
                                        <i class="bi bi-arrow-left-circle fs-2"></i>
                                    </button>
                                </div>

                                <div class="col-6">
                                    <button type="button" class="btn btn-success w-100 fs-2" onclick="processGiaThue()">
                                        Tính tiền
                                    </button>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col thue notification"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- BILL -->
        <div class="row align-items-center" style="height: 100vh;" id="modal-bill" hidden>
            <div class="col">
                <div class="card text-center">
                    <div class="card-header">
                        <span class="badge text-bg-secondary fs-2">TIỀN TRỌ</span><br>
                        <span class="text-secondary fs-5" id="bill-date"></span>
                    </div>

                    <div class="card-body">
                        <div class="row">
                            <div class="input-group mb-2">
                                <span class="input-group-text" style="width: 75px;">ĐIỆN</span>
                                <span class="input-group-text" id="bill-so-dien"></span>
                                <input type="text" class="form-control text-end" id="bill-tien-dien" disabled>
                                <span class="input-group-text">VND</span>
                            </div>

                            <div class="input-group mb-2">
                                <span class="input-group-text" style="width: 75px;">NƯỚC</span>
                                <span class="input-group-text" id="bill-so-nuoc"></span>
                                <input type="text" class="form-control text-end" id="bill-tien-nuoc" disabled>
                                <span class="input-group-text">VND</span>
                            </div>

                            <div class="input-group mb-2">
                                <span class="input-group-text" style="width: 75px;">RÁC</span>
                                <span class="input-group-text">1</span>
                                <input type="text" class="form-control text-end" id="bill-tien-rac" disabled>
                                <span class="input-group-text">VND</span>
                            </div>


                            <div class="input-group">
                                <span class="input-group-text" style="width: 75px;">THUÊ</span>
                                <span class="input-group-text">1</span>
                                <input type="text" class="form-control text-end" id="bill-tien-thue" disabled>
                                <span class="input-group-text">VND</span>
                            </div>
                        </div>
                    </div>

                    <div class="card-footer fs-5">
                        <div class="input-group">
                            <span class="input-group-text fw-bold" style="width: 75px;">TỔNG</span>
                            <input type="text" class="form-control text-end" id="bill-tong" disabled>
                            <span class="input-group-text">VND</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="./assets/js/bootstrap.bundle.min.js"></script>

    <script src="./index.js"></script>

    <script>
        function nextModal(prevId, nextId) {
            document.getElementById(prevId).setAttribute("hidden", "");
            document.getElementById(nextId).removeAttribute("hidden");
        }

        function prevModal(prevId, currentId) {
            document.getElementById(currentId).setAttribute("hidden", "");
            document.getElementById(prevId).removeAttribute("hidden");
        }

        function notification(step, msg) {
            const container = document.querySelector(`.${step}.notification`);

            const content = document.createElement("div");
            content.className = "alert alert-danger mt-3 mb-3";
            content.role = "alert";
            content.innerText = msg;

            container.childNodes.forEach(e => e.remove());
            container.appendChild(content);

            setTimeout(() => {
                content.remove();
            }, 3000);
        }

        function processDien() {
            const step = "dien";

            const soDienCu = document.getElementById("so-dien-cu").value;

            if (soDienCu === "") return notification(step, "Chưa nhập số điện cũ!");
            if (Number(soDienCu) < 0) return notification(step, "Số điện lớn hơn hoặc bằng 0!");

            const soDienMoi = document.getElementById("so-dien-moi").value;
            if (soDienMoi === "") return notification(step, "Chưa nhập số điện mới!");
            if (Number(soDienMoi) < 0) return notification(step, "Số điện lớn hơn hoặc bằng 0!");

            if (!Number.isInteger(Number(soDienCu)) || !Number.isInteger(Number(soDienMoi))) return notification(step, "Số điện phải là số nguyên!");

            if (Number(soDienMoi) - Number(soDienCu) <= 0) return notification(step, "Số điện mới phải lớn hơn số điện cũ!");

            nextModal("modal-dien", "modal-nuoc");
        }

        function processNuoc() {
            const step = "nuoc";

            const soNuocCu = document.getElementById("so-nuoc-cu").value;
            if (soNuocCu === "") return notification(step, "Chưa nhập số nước cũ!");
            if (Number(soNuocCu) < 0) return notification(step, "Số nước lớn hơn hoặc bằng 0!");

            const soNuocMoi = document.getElementById("so-nuoc-moi").value;
            if (soNuocMoi === "") return notification(step, "Chưa nhập số nước mới!");
            if (Number(soNuocMoi) < 0) return notification(step, "Số nước lớn hơn hoặc bằng 0!");

            if (!Number.isInteger(Number(soNuocCu)) || !Number.isInteger(Number(soNuocMoi))) return notification(step, "Số nước phải là số nguyên!");

            if (Number(soNuocMoi) - Number(soNuocCu) <= 0) return notification(step, "Số nước mới phải lớn hơn số nước cũ!");

            nextModal("modal-nuoc", "modal-rac");
        }

        function processGiaThueChoice(element) {
            if (element.classList.contains("active")) return;

            element.classList.add("active");

            const choices = document.querySelectorAll(".gia-thue-choice");

            for (const e of choices) {
                if (e === element) continue;

                e.classList.remove("active");
            }
        }

        function parseVND(num) {
            return num.toLocaleString("vi-VN");
        }

        function calculatingResult() {
            const DIEN_RATE = 3500;
            const NUOC_RATE = 3500;
            const RAC_RATE = 3500;

            const soDienCu = document.getElementById("so-dien-cu").value;
            const soDienMoi = document.getElementById("so-dien-moi").value;
            const soDien = (Number(soDienMoi) - Number(soDienCu));
            const tienDien = soDien * DIEN_RATE;

            const soNuocCu = document.getElementById("so-nuoc-cu").value;
            const soNuocMoi = document.getElementById("so-nuoc-moi").value;
            const soNuoc = Number(soNuocMoi) - Number(soNuocCu);
            const tienNuoc = soNuoc * NUOC_RATE;

            const tienThue = Number(document.querySelector(".gia-thue-choice.active").innerText.replace(/\./g, ""));

            const tong = tienDien + tienNuoc + RAC_RATE + tienThue;

            const now = new Date();
            document.getElementById("bill-date").innerText = `${now.toLocaleTimeString("vi-VN")} - ${now.toLocaleDateString("vi-VN")}`;

            document.getElementById("bill-so-dien").innerText = soDien;
            document.getElementById("bill-tien-dien").value = parseVND(tienDien);

            document.getElementById("bill-so-nuoc").innerText = soNuoc;
            document.getElementById("bill-tien-nuoc").value = parseVND(tienNuoc);

            document.getElementById("bill-tien-rac").value = parseVND(RAC_RATE);
            document.getElementById("bill-tien-thue").value = parseVND(tienThue);

            document.getElementById("bill-tong").value = parseVND(tong);

            nextModal("modal-thue", "modal-bill");
        }

        function processGiaThue() {
            const step = "thue";

            const choice = document.querySelector(".gia-thue-choice.active");
            if (!choice) return notification(step, "Chưa chọn giá thuê!");

            calculatingResult();
        }
    </script>
</body>

</html>
